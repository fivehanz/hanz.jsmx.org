upstream wagtail {
    server unix:/var/run/wagtail/wagtail.sock;
    keepalive 64;
}

proxy_cache_path /var/cache/nginx/wagtail
    keys_zone=wagtail_cache:32m
    max_size=256m
    inactive=60m
    use_temp_path=off;

server {
    listen 80 reuseport;
    # listen [::]:80;
    server_name bsd.jsmx.org hbsd.jsmx.org hanz.jsmx.org;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl reuseport backlog=4096;
    # listen [::]:443 ssl;
    http2 on;
    server_name bsd.jsmx.org hbsd.jsmx.org hanz.jsmx.org;

    ssl_certificate     /usr/local/etc/ssl/cf-origin.pem;
    ssl_certificate_key /usr/local/etc/ssl/cf-origin.key;

    # upload protection
    client_max_body_size 16m;
    client_body_timeout 10s;
    client_header_timeout 10s;
    send_timeout 15s;

    # security headers
    # add_header Strict-Transport-Security "max-age=31536000" always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    location /static/ {
        alias /usr/local/www/wagtail/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # location /media/ {
    #    alias /usr/local/www/wagtail/media/;
    #    expires 7d;
    #    add_header Cache-Control "public";
    #    access_log off;
    #    sendfile on;
    # }

    # optional: restrict admin to specific IP
    # location /admin/ {
    #     allow YOUR.IP.ADDRESS;
    #     deny all;
    # }

    location / {
        proxy_pass http://wagtail;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Real-IP $remote_addr;

        proxy_connect_timeout 1s;
        proxy_read_timeout 2s;
        proxy_send_timeout 2s;

        proxy_buffering on;
        proxy_buffers 4 16k;
        proxy_buffer_size 8k;

        proxy_cache wagtail_cache;
        proxy_cache_valid 200 301 302 404 10m;
        proxy_cache_min_uses 2;

        proxy_cache_key "$host$request_uri";

        proxy_cache_lock on;
        proxy_cache_lock_timeout 10s;
        proxy_cache_lock_age 10s;

        proxy_cache_use_stale updating error timeout http_500 http_502 http_503 http_504;
        proxy_cache_background_update on;

        proxy_cache_revalidate off;

        proxy_next_upstream error timeout http_500 http_502 http_503 http_504;
        proxy_next_upstream_tries 1;

        proxy_ignore_headers Set-Cookie;
        proxy_ignore_headers Cache-Control;

        set $skip_cache 0;

        if ($cookie_sessionid) { set $skip_cache 1; }
        if ($http_authorization) { set $skip_cache 1; }

        proxy_cache_bypass $skip_cache;
        proxy_no_cache $skip_cache;

        add_header X-Server-Cache $upstream_cache_status;
    }
}