# ================================
# Default Nginx Config for FreeBSD 15
# Optimized for 469MB RAM, TLS 1.2, HTTP/2
# ================================

user www;
worker_processes auto;
worker_rlimit_nofile 32768;

events {
    worker_connections 4096;
    use kqueue;
    multi_accept on;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    server_tokens off;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;

    keepalive_timeout 10;
    keepalive_requests 200;

    # ---------------------------
    # Small buffers to save RAM
    # ---------------------------
    client_body_buffer_size 8k;
    client_header_buffer_size 1k;
    large_client_header_buffers 2 1k;
    output_buffers 1 32k;
    postpone_output 1460;

    # ---------------------------
    # Gzip compression
    # ---------------------------
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_min_length 512;
    gzip_types text/plain text/css application/json application/javascript;

    # ---------------------------
    # Open file cache for static files
    # ---------------------------
    open_file_cache max=500 inactive=30s;
    open_file_cache_valid 60s;
    open_file_cache_min_uses 2;
    open_file_cache_errors off;

    # ---------------------------
    # SSL / TLS defaults
    # ---------------------------
    ssl_protocols TLSv1.3 TLSv1.2;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:512k;
    ssl_session_timeout 10m;
    ssl_session_tickets off;
    ssl_buffer_size 4k;

    #ssl_ciphers 'TLS_AES_256_GCM_SHA384:TLS_AES_128_GCM_SHA256:TLS_CHACHA20_POLY1305_SHA256';

    # OCSP stapling for faster TLS handshake
    #    ssl_stapling on;
    #    ssl_stapling_verify on;
    #    resolver 1.1.1.1 1.0.0.1 valid=300s;
    #    resolver_timeout 5s;

    # ---------------------------
    # Include per-site configurations
    # ---------------------------
    include /usr/local/etc/nginx/conf.d/*.conf;
}
